name: Seed daily videos

on:
  workflow_dispatch:

concurrency:
  group: seed-daily-videos
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Call seed endpoint
        run: |
          echo "Calling $APP_BASE_URL/api/cron/seed"
          response_file="$(mktemp)"
          status_code="$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request GET \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron/seed?timeZone=America/New_York&firstRunHourLocal=11&firstRunMinuteLocal=0&channelSpacingMinutes=0")"
          echo "HTTP status: $status_code"
          cat "$response_file"
          test "$status_code" -ge 200 -a "$status_code" -lt 300
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

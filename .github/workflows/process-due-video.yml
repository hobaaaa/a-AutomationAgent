name: Process due video

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: process-due-video
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Call cron endpoint
        run: |
          echo "Calling $APP_BASE_URL/api/cron"
          response_file="$(mktemp)"
          status_code="$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request GET \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron")"
          echo "HTTP status: $status_code"
          cat "$response_file"
          test "$status_code" -ge 200 -a "$status_code" -lt 300
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
